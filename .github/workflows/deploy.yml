name: Build & Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Permite lanzar el despliegue manualmente desde GitHub

permissions:
  contents: write  # Necesario para push a gh-pages

jobs:
  build-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build
        env:
          # Formspree endpoint (e.g., /f/xxxxxxxx)
          # Add this secret in: GitHub repo → Settings → Secrets → Actions
          PUBLIC_FORMSPREE_ENDPOINT: ${{ secrets.FORMSPREE_ENDPOINT }}
          # hCaptcha public site key
          # Add this secret in: GitHub repo → Settings → Secrets → Actions
          PUBLIC_HCAPTCHA_SITE_KEY: ${{ secrets.HCAPTCHA_SITE_KEY }}

      - name: Deploy to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          cname: www.carpinterialopezyvidal.com
          commit_message: 'deploy: ${{ github.event.head_commit.message }}'
